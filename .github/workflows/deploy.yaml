name: Build and Deploy - Homologacao

on:
  push:
    branches:
      - master  

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build e Push da imagem
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/fernandindtjr/naviapp:1.0
          build-args: |
            MONGODB_URI=${{ secrets.MONGODB_URI }}
            SESSION_SECRET=${{ secrets.SESSION_SECRET }}

      - name: Deploy no Kubernetes
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl rollout restart deployment/fernandindtjr/naviapp:1.0 -n db-test
          kubectl rollout status deployment/fernandindtjr/naviapp:1.0 -n db-test --timeout=120s
