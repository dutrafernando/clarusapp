apiVersion: apps/v1
kind: Deployment
metadata:
  name: clarusapp
  namespace: db-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: clarusapp
  template:
    metadata:
      labels:
        app: clarusapp
    spec:
      containers:
        - name: clarusapp
          image: fernandindtjr/naviapp:1.0
          ports:
            - containerPort: 3000
          env:
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: clarusapp-secrets
                  key: MONGODB_URI
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: clarusapp-secrets
                  key: SESSION_SECRET
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
